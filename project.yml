name: MeetingScribe
options:
  bundleIdPrefix: com.zacharytgray
  deploymentTarget:
    macOS: "14.2"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "14.2"
    SWIFT_VERSION: "5.9"

schemes:
  MeetingScribe:
    build:
      targets:
        MeetingScribe: all
    run:
      config: Debug

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  MeetingScribe:
    type: application
    platform: macOS
    sources:
      - MeetingScribe
    dependencies:
      - package: Sparkle
    settings:
      base:
        INFOPLIST_FILE: MeetingScribe/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.zacharytgray.MeetingScribe
        MARKETING_VERSION: "2.4.3"
        CURRENT_PROJECT_VERSION: "22"
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
        ENABLE_HARDENED_RUNTIME: false
